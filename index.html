
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- Fallback title/description — react-helmet-async overrides these per page -->
      <title>Servio — Web Development Agency</title>
      <meta name="description" content="Servio builds fast, conversion-focused websites for startups and small businesses — landing pages, e-commerce, portfolios, and custom web apps." />
      <meta name="robots" content="index, follow" />
      <!-- Preconnect to speed up external resource fetches -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
      <!-- Single trimmed font request: Inter (UI) · Fraunces (display) · Anek Devanagari (Indic accent) · JetBrains Mono -->
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Anek+Devanagari:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
      <link rel="preconnect" href="https://images.unsplash.com" />
      <meta name="google-site-verification" content="M3FdJVaZukSPEBZWlPEcRWcJX65YTLwO8AS9Kp-Lj60" />
      <meta name="theme-color" content="#100d0a" />
      <link rel="icon" href="/favicon.ico" sizes="48x48" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
      <link rel="manifest" href="/manifest.webmanifest" />
      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }
        /* Dark luxury base so the first paint (before React mounts) is never a white flash. */
        html, body, #root { background: #100d0a; }
        body { overscroll-behavior: none; }
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
        }
      </style>
      <script>window.__SERVIO_FP__ = performance.now();</script>

    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
